name: Build and deploy Node.js app to Azure Web App - calgaryinternational

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install and build React client
        run: |
          cd client
          npm install
          npm run build
        env:
          REACT_APP_API_URL: 'https://calgaryinternational-dkb0cfa3fmg8g9bb.canadacentral-01.azurewebsites.net'

      - name: Install server dependencies
        run: |
          cd server
          npm install --omit=dev

      - name: Copy client build into server
        run: cp -r client/build server/client-build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: server

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'calgaryinternational'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .